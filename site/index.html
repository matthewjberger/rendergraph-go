<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>indigo editor</title>
<meta property="og:title" content="indigo editor">
<meta property="og:description" content="An early game engine written in Go: archetype ECS and a wgpu-backed render graph, running in the browser.">
<meta property="og:image" content="preview.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="preview.png">
<style>
  :focus { outline: none; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #0f0f12;
    color: #c8c8d0;
    font-family: system-ui, -apple-system, sans-serif;
  }
  body { display: flex; flex-direction: column; }
  #status {
    padding: 8px 12px;
    font-size: 13px;
    display: none;
    z-index: 200;
  }
  #status.visible { display: block; }
  #canvas {
    flex: 1 1 auto;
    display: block;
    width: 100%;
    height: 100%;
  }
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0f0f12;
    color: #c8c8d0;
    font-family: system-ui, -apple-system, sans-serif;
    z-index: 100;
    opacity: 1;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  #loading.hidden { opacity: 0; }
  .spinner {
    width: 56px;
    height: 56px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top-color: #818cf8;
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  .loading-text {
    margin-top: 18px;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  a { color: #ffb86c; }
</style>
</head>
<body>
<div id="status"></div>
<canvas id="canvas" width="1280" height="720"></canvas>
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading Indigo Game Engine...</div>
</div>

<script src="wasm_exec.js"></script>
<script>
  const status = document.getElementById('status');
  const showStatus = (msg) => {
    status.textContent = msg;
    status.classList.add('visible');
  };
  const hideLoading = () => {
    const loading = document.getElementById('loading');
    if (loading) {
      loading.classList.add('hidden');
      setTimeout(() => loading.remove(), 500);
    }
  };

  if (!navigator.gpu) {
    showStatus('WebGPU is not available in this browser. Try the latest Chrome, Edge, or Safari 26+.');
    hideLoading();
  } else if (typeof Go === 'undefined') {
    showStatus('Failed to load the wasm runtime (wasm_exec.js). Check the deploy paths.');
    hideLoading();
  } else {
    const go = new Go();
    WebAssembly.instantiateStreaming(fetch('main.wasm'), go.importObject)
      .then((result) => {
        window.wasm = result;
        hideLoading();
        go.run(result.instance);
      })
      .catch((err) => {
        showStatus('Failed to load wasm: ' + err);
        console.error(err);
        hideLoading();
      });
  }
</script>
</body>
</html>
