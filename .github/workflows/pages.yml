name: Github Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build wasm bundles
        env:
          GOOS: js
          GOARCH: wasm
        run: |
          mkdir -p site/editor site/breakout
          go build -o site/editor/main.wasm ./cmd/editor
          go build -o site/breakout/main.wasm ./cmd/breakout
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" site/editor/wasm_exec.js
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" site/breakout/wasm_exec.js

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          single-commit: true
