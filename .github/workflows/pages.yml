name: Github Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build wasm bundle
        env:
          GOOS: js
          GOARCH: wasm
        run: |
          go build -ldflags="-s -w" -trimpath -o site/main.wasm ./cmd/editor
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" site/wasm_exec.js

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          single-commit: true
